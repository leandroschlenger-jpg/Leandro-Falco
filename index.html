// desTrib=true:              base = base × (1 − 14,53%)
const baseCalc = (bruto, liq, incRetidos, desTrib) => {
  let base = incRetidos ? bruto : liq;
  if (desTrib) base = r2(base * (1 - TRIB));

};

function buildFatFromCad(raw, cadastro) {
  return raw.map(r => {
    const cad = cadastro[r.projeto];
    if (!cad) return {...r, parceiros:[], totalRepasse:0, status:'novo'};
    const parceiros = cad.map(p => ({...p, repasse:r2(r.liq*p.pct)}));
    const totalRepasse = r2(parceiros.reduce((s,p)=>s+p.repasse,0));
    return {...r, parceiros, totalRepasse, status: parceiros.length>0?'historico':'sem_parceiro'};
  });
}

function BarChart({labels,datasets}) {
  const ref=useRef();
  useEffect(()=>{
    const ch=new Chart(ref.current,{type:'bar',data:{labels,datasets:datasets.map(d=>({...d,borderRadius:4}))},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}},tooltip:{callbacks:{label:c=>fmt(c.raw)}}},
        scales:{x:{ticks:{color:'#64748b'},grid:{color:'#1e293b'}},y:{ticks:{color:'#64748b',callback:v=>`${(v/1000).toFixed(0)}k`},grid:{color:'#334155'}}}}});
    return ()=>ch.destroy();
  },[]);
  return <div className="cwrap"><canvas ref={ref}/></div>;
}
function HBar({data}) {
  const ref=useRef();
  useEffect(()=>{
    const ch=new Chart(ref.current,{type:'bar',
      data:{labels:data.map(d=>d.nome),datasets:[{label:'Repasse',data:data.map(d=>d.rep),backgroundColor:'rgba(16,185,129,.75)',borderRadius:4}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.raw)}}},
        scales:{x:{ticks:{color:'#64748b',callback:v=>`${(v/1000).toFixed(0)}k`},grid:{color:'#334155'}},y:{ticks:{color:'#94a3b8',font:{size:11}},grid:{color:'#1e293b'}}}}});
    return ()=>ch.destroy();
  },[]);
  return <div style={{position:'relative',width:'100%',height:`${data.length*32+30}px`}}><canvas ref={ref}/></div>;
}

/* ══ EDITOR DE PARCEIROS POR PROJETO ══ */
function ParceirosEditor({bruto, liq, value, onChange, todosParceiros}) {
  const add = () => onChange([...value,{nome:'',tipo:'pct',pct:'',fixo:'',desRetidos:false,desTrib:false,repasse:0}]);
  const remove = i => onChange(value.filter((_,j)=>j!==i));

  const calcRepasse = (p) => {
    if (p.tipo === 'fixo') return r2(parseFloat(p.fixo)||0);
    const base = baseCalc(bruto, liq, !!p.desRetidos, !!p.desTrib);
    return r2(base * (parseFloat(p.pct)||0) / 100);
  };

  const change = (i, k, v) => {
    onChange(value.map((p,j) => {
      if (j!==i) return p;
      const u = {...p, [k]: v};
      u.repasse = calcRepasse(u);
      return u;
    }));
  };

  const total = r2(value.reduce((s,p) => s + calcRepasse(p), 0));

  // Monta descrição visual da base de cálculo
  const descBase = (p) => {
    const b = baseCalc(bruto, liq, !!p.desRetidos, !!p.desTrib);
    const etapas = [];
    if (p.desRetidos) etapas.push(`Bruto ${fmt(bruto)} (retidos incluídos)`);
    else              etapas.push(`Líquido ${fmt(liq)} (já sem retidos)`);
    if (p.desTrib)    etapas.push(`− tributos 14,53% = ${fmt(b)}`);
    return { base: b, desc: etapas.join(' → ') };
  };

  return (
    <div>
      {value.map((p,i)=>(
        <div key={i} style={{background:'#0f172a',borderRadius:10,padding:'12px 14px',marginBottom:10,border:'1px solid #334155'}}>
          {/* Linha principal */}
          <div style={{display:'flex',flexWrap:'wrap',gap:10,alignItems:'flex-end'}}>
            <div style={{flex:'2 1 160px'}}>
              <label style={{marginBottom:3}}>Parceiro {i+1}</label>
              <select value={p.nome} onChange={e=>change(i,'nome',e.target.value)}>
                <option value="">Selecione...</option>
                {todosParceiros.filter(t=>t.ativo).map(t=><option key={t.id}>{t.nome}</option>)}
              </select>
            </div>
            <div style={{flex:'0 0 130px'}}>
              <label style={{marginBottom:3}}>Tipo</label>
              <select value={p.tipo||'pct'} onChange={e=>change(i,'tipo',e.target.value)}>
                <option value="pct">% sobre base</option>
                <option value="fixo">Valor fixo (R$)</option>
              </select>
            </div>
            <div style={{flex:'0 0 100px'}}>
              {(!p.tipo||p.tipo==='pct') ? (
                <><label style={{marginBottom:3}}>% Repasse</label>
                  <input type="number" min="0" max="100" step="0.0001" value={p.pct} placeholder="ex: 22.91" onChange={e=>change(i,'pct',e.target.value)}/></>
              ) : (
                <><label style={{marginBottom:3}}>Valor fixo (R$)</label>
                  <input type="number" min="0" step="0.01" value={p.fixo} placeholder="ex: 5000" onChange={e=>change(i,'fixo',e.target.value)}/></>
              )}
            </div>
            <div style={{flex:'0 0 120px'}}>
              <label style={{marginBottom:3}}>Repasse calc.</label>
              <div style={{padding:'8px 10px',background:'rgba(16,185,129,.1)',borderRadius:8,color:'#10b981',fontWeight:700,fontSize:13}}>
                {fmt(calcRepasse(p))}
              </div>
            </div>
            {value.length>1&&<div><button className="btn btn-x btn-sm" onClick={()=>remove(i)}>✕</button></div>}
          </div>

          {/* Toggles de dedução — só para tipo % */}
          {(!p.tipo||p.tipo==='pct')&&(
            <div style={{marginTop:10,padding:'10px 12px',background:'rgba(99,102,241,.05)',borderRadius:8,border:'1px solid rgba(99,102,241,.1)'}}>
              <div style={{fontSize:11,color:'#64748b',marginBottom:8,textTransform:'uppercase',letterSpacing:'.04em'}}>Base de cálculo</div>

              {/* Toggle retidos */}
              <label style={{display:'flex',alignItems:'center',gap:7,cursor:'pointer',marginBottom:8,color:'#94a3b8',fontSize:12}}>
                <input type="checkbox" style={{width:'auto',accentColor:'#10b981'}}
                  checked={!!p.desRetidos} onChange={e=>change(i,'desRetidos',e.target.checked)}/>
                <span>
                  Incluir retidos <strong style={{color:'#10b981'}}>6,15%</strong> na base
                  <span style={{color:'#475569',marginLeft:4}}>(devolve retidos → usa bruto {fmt(bruto)})</span>
                </span>
              </label>

              {/* Toggle tributos */}
              <label style={{display:'flex',alignItems:'center',gap:7,cursor:'pointer',marginBottom:10,color:'#94a3b8',fontSize:12}}>
                <input type="checkbox" style={{width:'auto',accentColor:'#818cf8'}}
                  checked={!!p.desTrib} onChange={e=>change(i,'desTrib',e.target.checked)}/>
                <span>Deduzir tributos <strong style={{color:'#818cf8'}}>14,53%</strong> antes de calcular o repasse</span>
              </label>

              {/* Preview da base */}
              {p.nome&&(
                <div style={{fontSize:12,color:'#64748b',borderTop:'1px solid #334155',paddingTop:8}}>
                  {descBase(p).desc}
                  <span style={{margin:'0 6px',color:'#334155'}}>·</span>
                  <strong style={{color:'#e2e8f0'}}>Base: {fmt(descBase(p).base)}</strong>
                  <span style={{margin:'0 6px',color:'#334155'}}>×</span>
                  <strong style={{color:'#818cf8'}}>{(parseFloat(p.pct)||0).toFixed(4)}%</strong>
                  <span style={{margin:'0 6px',color:'#334155'}}>=</span>
                  <strong style={{color:'#10b981'}}>{fmt(calcRepasse(p))}</strong>
                </div>
              )}
            </div>
          )}
        </div>
      ))}

      <button className="btn btn-s btn-sm mt3" onClick={add} style={{marginBottom:12}}>＋ Adicionar parceiro</button>

      {value.some(p=>p.nome)&&(
        <div style={{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.15)',borderRadius:8,padding:'9px 14px',fontSize:13}}>
          Total repasses: <strong className="ca">{fmt(total)}</strong>
        </div>
      )}
    </div>
  );
}

  const totalRep=fat.reduce((s,f)=>s+f.totalRepasse,0);
  const nNov=fat.filter(f=>f.status==='novo').length;
  const byParc={};
  fat.forEach(f=>f.parceiros.forEach(p=>{ if(!byParc[p.nome])byParc[p.nome]=0; byParc[p.nome]+=p.repasse; }));
  const parcData=Object.entries(byParc).map(([nome,rep])=>({nome,rep})).sort((a,b)=>b.rep-a.rep);
  const TOTAL_BRUTO=fat.reduce((s,f)=>s+f.bruto,0);
  const TOTAL_LIQ=fat.reduce((s,f)=>s+f.liq,0);
  return (
    <div>
      <div className="ttl">Dashboard – Maio/2026</div>
      <div className="sub">pivot.xlsx × Cadastro Parceiros · dados persistidos no navegador</div>
      <div className="g5 mb6">
        {[{l:'Receita Bruta',v:fmt(TOTAL_BRUTO),c:'ci'},{l:'Retenções',v:fmt(fat.reduce((s,f)=>s+f.ret,0)),c:'cr'},{l:'Receita Líquida',v:fmt(TOTAL_LIQ),c:'cg'},{l:'Total Repasses',v:fmt(totalRep),c:'ca'},{l:'Lucro',v:fmt(TOTAL_LIQ-totalRep),c:'cb'}]
          .map((c,i)=>(<div key={i} className="card card-p"><div className="kpi-label">{c.l}</div><div className={`kpi-value ${c.c}`}>{c.v}</div></div>))}
      </div>
      <div className="g3 mb4">
        {[{l:'✓ Com repasse',v:fat.filter(f=>f.status==='historico').length,c:'cg',d:'Parceiros definidos'},{l:'➖ Sem repasse',v:fat.filter(f=>f.status==='sem_parceiro').length,c:'cgr',d:'Cadastrado N/A'},{l:'⚠ Não cadastrado',v:nNov,c:'ca',d:'Revisão manual necessária'}]
          .map((c,i)=>(<div key={i} className="card card-p tc"><div className="kpi-label">{c.l}</div><div className={`kpi-value ${c.c}`}>{c.v} projetos</div><div style={{color:'#64748b',fontSize:11,marginTop:3}}>{c.d}</div></div>))}
      </div>
      <div className="g2">
        <div className="card card-p">
          <div className="fw6 mb4" style={{fontSize:13}}>Top 10 Projetos</div>
          <BarChart labels={fat.slice(0,10).map(f=>f.projeto)} datasets={[{label:'Bruta',data:fat.slice(0,10).map(f=>f.bruto),backgroundColor:'rgba(99,102,241,.7)'},{label:'Líquida',data:fat.slice(0,10).map(f=>f.liq),backgroundColor:'rgba(16,185,129,.65)'}]}/>
        </div>
        <div className="card card-p">
          <div className="fw6 mb4" style={{fontSize:13}}>Repasse por Parceiro</div>
          {parcData.length>0?<HBar data={parcData}/>:<div style={{color:'#64748b',fontSize:13}}>Nenhum repasse calculado ainda.</div>}
        </div>
      </div>
    </div>
  );
}

/* ── Exportar CSV (abre no Excel) ── */
function exportarCSV(rows, nome='conferencia_maio2026') {
  const cols = [
    'Data','Projeto','Cliente',
    'Parceiro','%','Retidos?','Tributos?','Repasse Parceiro',
    'Rec. Bruta','Retenções','Rec. Líquida','Total Repasse','Conferido'
  ];
  const linhas = [];
  rows.forEach(f => {
    if (f.parceiros.length === 0) {
      linhas.push([
        f.data, f.projeto, f.cliente,
        '—','—','—','—', 0,
        f.bruto, f.ret, f.liq, f.totalRepasse,
        f.conferido ? 'Sim' : 'Não'
      ]);
    } else {
      f.parceiros.forEach((p, i) => {
        linhas.push([
          i===0 ? f.data : '',
          i===0 ? f.projeto : '',
          i===0 ? f.cliente : '',
          p.nome,
          p.tipo==='fixo' ? 'Fixo' : (p.pct*100).toFixed(4)+'%',
          p.desRetidos ? 'Sim (+ret)' : 'Não',
          p.desTrib    ? 'Sim (-trib)' : 'Não',
          p.repasse,
          i===0 ? f.bruto : '',
          i===0 ? f.ret   : '',
          i===0 ? f.liq   : '',
          i===0 ? f.totalRepasse : '',
          i===0 ? (f.conferido?'Sim':'Não') : ''
        ]);
      });
    }
  });

  const sep = ';';
  const fmtCell = v => {
    if (v === '' || v === undefined) return '';
    if (typeof v === 'number') return String(v).replace('.',',');
    return `"${String(v).replace(/"/g,'""')}"`;
  };
  const csv = '﻿' + // BOM para UTF-8 no Excel
    cols.map(c=>`"${c}"`).join(sep) + '\n' +
    linhas.map(r => r.map(fmtCell).join(sep)).join('\n');

  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `${nome}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

/* ══ CONFERÊNCIA ══ */
function Conferencia({fat,setFat,todosParceiros,setCadastro,setPage}) {

  const [editParc,setEditParc]=useState([]);
  const [sort,setSort]=useState({col:'id',dir:'asc'});

  const toggleSort = col => setSort(s => ({col, dir: s.col===col && s.dir==='asc' ? 'desc' : 'asc'}));

  const SortTh = ({col, children, className=''}) => {
    const active = sort.col===col;
    return (
      <th className={className}
        onClick={()=>toggleSort(col)}
        style={{cursor:'pointer',userSelect:'none',whiteSpace:'nowrap',
          color: active ? '#a5b4fc' : '#64748b',
          background: active ? 'rgba(99,102,241,.08)' : '#0f172a'}}>
        {children}
        <span style={{marginLeft:4,fontSize:10,opacity: active?1:.4}}>
          {active ? (sort.dir==='asc'?'▲':'▼') : '⇅'}
        </span>
      </th>
    );
  };

  const getSortVal = (f, col) => {
    switch(col) {
      case 'data':         return f.data||'';
      case 'projeto':      return f.projeto.toLowerCase();
      case 'cliente':      return f.cliente.toLowerCase();
      case 'parceiro':     return (f.parceiros[0]?.nome||'').toLowerCase();
      case 'bruto':        return f.bruto;
      case 'liq':          return f.liq;
      case 'totalRepasse': return f.totalRepasse;

      case 'conferido':    return f.conferido ? 1 : 0;

  });

    const va=getSortVal(a,sort.col), vb=getSortVal(b,sort.col);
    if(typeof va==='number') return sort.dir==='asc'?va-vb:vb-va;
    return sort.dir==='asc'?va.localeCompare(vb,undefined,{sensitivity:'base'}):vb.localeCompare(va,undefined,{sensitivity:'base'});
  });

  const salvarEdit=()=>{

      if (p.tipo==='fixo') return r2(parseFloat(p.fixo)||0);

            {filtered.map(f=>(

                <td className="fw6" style={{maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',verticalAlign:'top',paddingTop:13}}>{f.projeto}</td>
                <td style={{color:'#64748b',fontSize:11,maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',verticalAlign:'top',paddingTop:13}}>{f.cliente}</td>

                        <span style={{color:'#64748b'}}>→</span>
                        <span className="rep">{fmt(p.repasse)}</span>
                      </div>
                    ))}
                </td>
                <td className="tr ci" style={{verticalAlign:'top',paddingTop:13}}>{fmt(f.bruto)}</td>
                <td className="tr cg fw6" style={{verticalAlign:'top',paddingTop:13}}>{fmt(f.liq)}</td>
                <td className="tr ca fw6" style={{verticalAlign:'top',paddingTop:13}}>{f.totalRepasse>0?fmt(f.totalRepasse):'—'}</td>
                <td style={{verticalAlign:'top',paddingTop:13}}>{statusBadge(f)}</td>
                <td style={{verticalAlign:'top',paddingTop:10}}>
                  <div style={{display:'flex',gap:6,alignItems:'center'}}>
                    <label title="Marcar como conferido" style={{cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
                      <input type="checkbox" style={{width:'auto',accentColor:'#10b981',width:16,height:16}}

                        onChange={e=>setFat(d=>d.map(r=>r.id!==f.id?r:{...r,conferido:e.target.checked}))}/>
                      <span style={{fontSize:11,color:f.conferido?'#10b981':'#64748b'}}>{f.conferido?'✓ OK':'—'}</span>
                    </label>
                    <button className="btn btn-s btn-sm" onClick={()=>abrirEdit(f)}>✏️</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="flex mt4" style={{gap:10}}>
        <button className="btn btn-p" onClick={()=>setPage('fechamento')}>Confirmar → Fechamento</button>
        <button className="btn btn-s" onClick={()=>exportarCSV(filtered)}>📊 Exportar Excel</button>
      </div>

      <Modal open={!!modal} onClose={()=>setModal(null)} title={`Parceiros – ${modal?.projeto}`} width={640}>
        {modal&&(
          <>
            <div style={{color:'#64748b',fontSize:13,marginBottom:14}}>{modal.cliente} · Líquido: <strong className="cg">{fmt(modal.liq)}</strong></div>
            <div className="info-box">💡 Adicione quantos parceiros quiser. Cada um tem % individual sobre a receita líquida.</div>

              <button className="btn btn-p" onClick={salvarEdit}>Salvar alterações</button>
              <button className="btn btn-s" onClick={()=>setModal(null)}>Cancelar</button>
            </div>
          </>
        )}
      </Modal>
    </div>
  );
}

/* ══ SEM PARCEIRO ══ */
function SemParceiro({fat,setFat,todosParceiros,setCadastro}) {
  const [tab,setTab]           = useState('novo');
  const [modal,setModal]       = useState(null);
  const [editParc,setEditParc] = useState([{nome:'',tipo:'pct',pct:'',fixo:'',desRetidos:false,desTrib:false,repasse:0}]);
  const [salvarCad,setSalvarCad] = useState(true);

  const novos   = fat.filter(f=>f.status==='novo');
  const semParc = fat.filter(f=>f.status==='sem_parceiro');

  const abrirModal = f => {
    setModal(f);
    setEditParc([{nome:'',tipo:'pct',pct:'',fixo:'',desRetidos:false,desTrib:false,repasse:0}]);
    setSalvarCad(true);
  };

  const salvar = () => {
    const template = editParc.filter(p=>p.nome&&(p.pct||p.fixo)).map(p=>({
      nome:p.nome, tipo:p.tipo||'pct', desRetidos:!!p.desRetidos, desTrib:!!p.desTrib,
      pct:p.tipo==='fixo'?0:r2(parseFloat(p.pct)/100),
      fixo:p.tipo==='fixo'?r2(parseFloat(p.fixo)||0):0,
    }));
    const proj = modal.projeto;
    setFat(d=>d.map(r=>{
      if(r.projeto!==proj||(r.status!=='novo'&&r.status!=='sem_parceiro')) return r;
      const parceiros = template.map(p=>{
        if(p.tipo==='fixo') return {...p,repasse:p.fixo};
        return {...p,repasse:r2(baseCalc(r.bruto,r.liq,p.desRetidos,p.desTrib)*p.pct)};
      });
      return {...r,parceiros,totalRepasse:r2(parceiros.reduce((s,p)=>s+p.repasse,0)),status:parceiros.length>0?'historico':'sem_parceiro'};
    }));
    if(salvarCad&&template.length>0) setCadastro(c=>({...c,[proj]:template}));
    setModal(null);
  };

  // Marca como "sem parceiro" (N/A)
  const ignorar = id => setFat(d=>d.map(r=>r.id!==id?r:{...r,status:'sem_parceiro',parceiros:[],totalRepasse:0}));

  // Restaura para "não cadastrado" — desfaz ação acidental
  const restaurar = id => setFat(d=>d.map(r=>r.id!==id?r:{...r,status:'novo',parceiros:[],totalRepasse:0}));

  // Totais da aba sem parceiro
  const totalBrutoSP = semParc.reduce((s,f)=>s+f.bruto,0);
  const totalLiqSP   = semParc.reduce((s,f)=>s+f.liq,0);
  const totalRetSP   = semParc.reduce((s,f)=>s+f.ret,0);

  const CardItem = ({f, actions}) => (
    <div className="card card-p mb3" style={{borderLeft:`3px solid ${f.status==='novo'?'#fb923c':'#475569'}`}}>
      <div className="flex jb as">
        <div style={{flex:1}}>
          <div className="flex ac mb2" style={{gap:8}}>
            <span className="fw7" style={{fontSize:14}}>{f.projeto}</span>
            <span style={{color:'#64748b',fontSize:11}}>{f.data}</span>
          </div>
          <div style={{color:'#64748b',fontSize:12,marginBottom:8}}>{f.cliente}</div>
          <div className="flex ac" style={{gap:14,fontSize:12,flexWrap:'wrap'}}>
            <span>Bruto: <strong className="ci">{fmt(f.bruto)}</strong></span>
            <span>Retenções: <strong className="cr">{fmt(f.ret)}</strong></span>
            <span>Líquido: <strong className="cg">{fmt(f.liq)}</strong></span>
          </div>
        </div>
        <div className="flex" style={{gap:8,marginLeft:14,flexShrink:0}}>{actions}</div>
      </div>
    </div>
  );

  return (
    <div>
      <div className="ttl">Sem Parceiro</div>
      <div className="sub" style={{display:'flex',gap:16,alignItems:'center'}}>
        <span>Gerencie lançamentos sem parceiro definido</span>
        {novos.length>0&&<span className="badge bo">⚠ {novos.length} não cadastrado(s)</span>}
        {semParc.length>0&&<span className="badge bgg">➖ {semParc.length} sem parceiro (N/A)</span>}
      </div>

      <div className="tab-bar">
        <button className={`tab${tab==='novo'?' on':''}`} onClick={()=>setTab('novo')}>
          ⚠️ Não Cadastrados ({novos.length})
        </button>
        <button className={`tab${tab==='sem'?' on':''}`} onClick={()=>setTab('sem')}>
          ➖ Sem Parceiro / N/A ({semParc.length})
        </button>
      </div>

      {/* ── ABA: NÃO CADASTRADOS ── */}
      {tab==='novo'&&(
        novos.length===0
          ? <div className="card card-p tc"><div style={{fontSize:42,marginBottom:12}}>✅</div><div className="fw6" style={{fontSize:16}}>Todos os projetos estão classificados!</div></div>
          : novos.map(f=>(
            <CardItem key={f.id} f={f} actions={<>
              <button className="btn btn-p" style={{fontSize:12}} onClick={()=>abrirModal(f)}>Definir Parceiro(s)</button>
              <button className="btn btn-s" style={{fontSize:12}} onClick={()=>ignorar(f.id)}>Sem parceiro</button>
            </>}/>
          ))
      )}

      {/* ── ABA: SEM PARCEIRO (N/A) ── */}
      {tab==='sem'&&(
        <div>
          {/* Totais */}
          {semParc.length>0&&(
            <div className="g3 mb4">
              {[
                {l:'Bruto Total',v:fmt(totalBrutoSP),c:'ci'},
                {l:'Retenções',  v:fmt(totalRetSP),  c:'cr'},
                {l:'Líquido Total',v:fmt(totalLiqSP),c:'cg'},
              ].map((c,i)=>(
                <div key={i} className="card card-p tc">
                  <div className="kpi-label">{c.l}</div>
                  <div className={`kpi-value ${c.c}`} style={{fontSize:18}}>{c.v}</div>
                </div>
              ))}
            </div>
          )}

          {semParc.length===0
            ? <div className="card card-p tc"><div style={{fontSize:42,marginBottom:12}}>✅</div><div className="fw6" style={{fontSize:16}}>Nenhum lançamento marcado como N/A.</div></div>
            : <>
                <div className="info-box mb4" style={{marginBottom:16}}>
                  💡 Esses lançamentos foram marcados como <strong>sem parceiro</strong>. Clique em <strong>Restaurar</strong> para desfazer, ou em <strong>Definir Parceiro</strong> para classificar.
                </div>
                <div className="card oa mb4">
                  <table>
                    <thead><tr>
                      <th>Data</th><th>Projeto</th><th>Cliente</th>
                      <th className="tr">Rec. Bruta</th><th className="tr">Retenções</th><th className="tr">Rec. Líquida</th>
                      <th></th>
                    </tr></thead>
                    <tbody>
                      {semParc.map(f=>(
                        <tr key={f.id}>
                          <td style={{color:'#64748b',fontSize:11,whiteSpace:'nowrap'}}>{f.data}</td>
                          <td className="fw6">{f.projeto}</td>
                          <td style={{color:'#64748b',fontSize:12,maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.cliente}</td>
                          <td className="tr ci">{fmt(f.bruto)}</td>
                          <td className="tr cr" style={{fontSize:12}}>{fmt(f.ret)}</td>
                          <td className="tr cg fw6">{fmt(f.liq)}</td>
                          <td>
                            <div className="flex" style={{gap:6}}>
                              <button className="btn btn-warn btn-sm" onClick={()=>restaurar(f.id)} title="Desfazer — volta para Não Cadastrados">↩ Restaurar</button>
                              <button className="btn btn-p btn-sm" onClick={()=>abrirModal(f)}>Definir Parceiro</button>
                            </div>
                          </td>
                        </tr>
                      ))}
                      <tr style={{borderTop:'2px solid #334155',background:'rgba(99,102,241,.04)'}}>
                        <td colSpan={3} className="fw7">TOTAL</td>
                        <td className="tr fw7 ci">{fmt(totalBrutoSP)}</td>
                        <td className="tr fw7 cr">{fmt(totalRetSP)}</td>
                        <td className="tr fw7 cg">{fmt(totalLiqSP)}</td>
                        <td></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </>
          }
        </div>
      )}

      <Modal open={!!modal} onClose={()=>setModal(null)} title={`Definir Parceiros – ${modal?.projeto}`} width={640}>
        {modal&&(
          <>
            <div style={{color:'#64748b',fontSize:13,marginBottom:14}}>
              {modal.cliente} · Bruto: <strong className="ci">{fmt(modal.bruto)}</strong> · Líquido: <strong className="cg">{fmt(modal.liq)}</strong>
            </div>
            <div className="info-box">💡 Adicione um ou mais parceiros. Cada um tem seu próprio % sobre a base escolhida.</div>
            <ParceirosEditor bruto={modal.bruto||0} liq={modal.liq||0} value={editParc} onChange={setEditParc} todosParceiros={todosParceiros}/>
            <div className="fg" style={{marginTop:12}}>
              <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
                <input type="checkbox" style={{width:'auto'}} checked={salvarCad} onChange={e=>setSalvarCad(e.target.checked)}/>
                Salvar classificação no Cadastro para os próximos meses
              </label>
            </div>
            <div className="flex" style={{gap:10}}>
              <button className="btn btn-p" disabled={!editParc.some(p=>p.nome&&(p.pct||p.fixo))} onClick={salvar}>Salvar</button>
              <button className="btn btn-s" onClick={()=>setModal(null)}>Cancelar</button>
            </div>
          </>
        )}
      </Modal>
    </div>
  );
}

/* ══ PARCEIROS / CADASTRO ══ */
function Parceiros({todosParceiros,setTodosParceiros,cadastro,setCadastro,fat}) {
  const [tab,setTab]=useState('parceiros');
  const [modal,setModal]=useState(false);
  const [modalCad,setModalCad]=useState(null); // editar cadastro de projeto
  const [editParc,setEditParc]=useState([{nome:'',pct:''}]);
  const [form,setForm]=useState({nome:'',cpf_cnpj:'',email:'',telefone:'',obs:''});
  const [busca,setBusca]=useState('');
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const salvarParceiro=()=>{
    if(!form.nome.trim()) return;
    const novo={id:uid(),nome:form.nome.trim(),cpf_cnpj:form.cpf_cnpj,email:form.email,telefone:form.telefone,obs:form.obs,ativo:true,criado:now()};
    setTodosParceiros(p=>[...p,novo]);
    setForm({nome:'',cpf_cnpj:'',email:'',telefone:'',obs:''});
    setModal(false);
  };

  const toggleAtivo=id=>setTodosParceiros(p=>p.map(x=>x.id===id?{...x,ativo:!x.ativo}:x));

  // Cadastro de projetos
  const projetosComFat=fat.map(f=>f.projeto);
  const projetosCad=Object.keys(cadastro);
  const todosProj=[...new Set([...projetosComFat,...projetosCad])].sort();

  const abrirCad=proj=>{
    setModalCad(proj);
    const cad=cadastro[proj]||[];
    setEditParc(cad.length>0?cad.map(p=>({...p,pct:+(p.pct*100).toFixed(4)})):[{nome:'',pct:''}]);
  };
  const salvarCad=()=>{
    const parceiros=editParc.filter(p=>p.nome&&p.pct).map(p=>({nome:p.nome,pct:r2(parseFloat(p.pct)/100)}));
    setCadastro(c=>({...c,[modalCad]:parceiros}));
    setModalCad(null);
  };

  const filtParc=todosParceiros.filter(p=>!busca||p.nome.toLowerCase().includes(busca.toLowerCase()));

  return (
    <div>
      <div className="ttl">Parceiros / Cadastro</div>
      <div className="sub">Gerencie parceiros e a classificação por projeto</div>
      <div className="tab-bar">
        {[['parceiros','👥 Parceiros'],['cadastro','📋 Cadastro por Projeto']].map(([id,l])=>(
          <button key={id} className={`tab${tab===id?' on':''}`} onClick={()=>setTab(id)}>{l}</button>
        ))}
      </div>

      {tab==='parceiros'&&(
        <div>
          <div className="flex jb ac mb4">
            <input placeholder="🔍 Buscar parceiro..." value={busca} onChange={e=>setBusca(e.target.value)} style={{maxWidth:280}}/>
            <button className="btn btn-p" onClick={()=>setModal(true)}>＋ Novo Parceiro</button>
          </div>
          <div className="card oa">
            <table>
              <thead><tr><th>#</th><th>Nome</th><th>CPF / CNPJ</th><th>E-mail</th><th>Telefone</th><th>Cadastrado em</th><th className="tc">Status</th><th></th></tr></thead>
              <tbody>
                {filtParc.map((p,i)=>(
                  <tr key={p.id}>
                    <td style={{color:'#475569'}}>{i+1}</td>
                    <td className="fw6">{p.nome}</td>
                    <td style={{color:'#94a3b8',fontSize:12}}>{p.cpf_cnpj||'—'}</td>
                    <td style={{color:'#94a3b8',fontSize:12}}>{p.email||'—'}</td>
                    <td style={{color:'#94a3b8',fontSize:12}}>{p.telefone||'—'}</td>
                    <td style={{color:'#64748b',fontSize:11}}>{p.criado||'—'}</td>
                    <td className="tc"><span className={`badge ${p.ativo?'bg':'br'}`}>{p.ativo?'Ativo':'Inativo'}</span></td>
                    <td><button className="btn btn-s btn-sm" onClick={()=>toggleAtivo(p.id)}>{p.ativo?'Desativar':'Ativar'}</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {tab==='cadastro'&&(
        <div>
          <div className="info-box mb4">📋 Tabela mestre de projetos × parceiros. Usada na classificação automática a cada importação.</div>
          <div className="card oa">
            <table>
              <thead><tr><th>Projeto</th><th>Parceiros cadastrados</th><th className="tc">Em Mai/26</th><th></th></tr></thead>
              <tbody>
                {todosProj.map((proj,i)=>{
                  const cad=cadastro[proj]||[];
                  const emMaio=fat.find(f=>f.projeto===proj);
                  return (
                    <tr key={i}>
                      <td className="fw6" style={{verticalAlign:'top',paddingTop:12}}>{proj}</td>
                      <td style={{verticalAlign:'top',paddingTop:8}}>
                        {cad.length===0?<span className="badge bgg">N/A</span>
                          :cad.map((p,j)=>(<div key={j} className="parc-chip"><span style={{color:'#e2e8f0'}}>{p.nome}</span><span className="pct">{fmtP(p.pct)}</span></div>))}
                      </td>
                      <td className="tc" style={{verticalAlign:'top',paddingTop:12}}>{emMaio?<span className="badge bg">✓</span>:<span className="badge bgg">—</span>}</td>
                      <td style={{verticalAlign:'top',paddingTop:10}}><button className="btn btn-s btn-sm" onClick={()=>abrirCad(proj)}>✏️ Editar</button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Modal novo parceiro */}
      <Modal open={modal} onClose={()=>setModal(false)} title="Cadastrar Novo Parceiro">
        <div className="g2">
          <div className="fg"><label>Nome completo *</label><input value={form.nome} onChange={e=>set('nome',e.target.value)} placeholder="Nome do parceiro"/></div>
          <div className="fg"><label>CPF / CNPJ</label><input value={form.cpf_cnpj} onChange={e=>set('cpf_cnpj',e.target.value)} placeholder="000.000.000-00"/></div>
          <div className="fg"><label>E-mail</label><input type="email" value={form.email} onChange={e=>set('email',e.target.value)}/></div>
          <div className="fg"><label>Telefone</label><input value={form.telefone} onChange={e=>set('telefone',e.target.value)}/></div>
        </div>
        <div className="fg"><label>Observações</label><textarea rows={2} value={form.obs} onChange={e=>set('obs',e.target.value)}/></div>
        <div className="flex" style={{gap:10}}>
          <button className="btn btn-p" disabled={!form.nome.trim()} onClick={salvarParceiro}>Cadastrar Parceiro</button>
          <button className="btn btn-s" onClick={()=>setModal(false)}>Cancelar</button>
        </div>
      </Modal>

      {/* Modal editar cadastro de projeto */}
      <Modal open={!!modalCad} onClose={()=>setModalCad(null)} title={`Editar Cadastro – ${modalCad}`} width={640}>
        {modalCad&&(
          <>
            <div className="info-box">Defina os parceiros padrão para <strong>{modalCad}</strong>. Será aplicado automaticamente nas próximas importações.</div>
            <ParceirosEditor bruto={fat.find(f=>f.projeto===modalCad)?.bruto||0} liq={fat.find(f=>f.projeto===modalCad)?.liq||0} value={editParc} onChange={setEditParc} todosParceiros={todosParceiros}/>
            <div className="flex mt4" style={{gap:10}}>
              <button className="btn btn-p" onClick={salvarCad}>Salvar no Cadastro</button>
              <button className="btn btn-s" onClick={()=>setCadastro(c=>{const n={...c};delete n[modalCad];return n;})&setModalCad(null)}>Remover do Cadastro</button>
              <button className="btn btn-s" onClick={()=>setModalCad(null)}>Cancelar</button>
            </div>
          </>
        )}
      </Modal>
    </div>
  );
}

/* ══ FECHAMENTO ══ */
function Fechamento({fat,fechamentos,setFechamentos,setFat}) {
  const MES='Maio/2026';
  const mesKey='2026-05';
  const fechamentoAtual=fechamentos.find(f=>f.mesKey===mesKey);
  const [confirmModal,setConfirmModal]=useState(false);

  const byParc={};
  fat.forEach(f=>f.parceiros.forEach(p=>{ if(!byParc[p.nome])byParc[p.nome]={projetos:[],repasse:0}; byParc[p.nome].projetos.push(f.projeto); byParc[p.nome].repasse+=p.repasse; }));
  const parcRows=Object.entries(byParc).map(([nome,v])=>({nome,...v})).sort((a,b)=>b.repasse-a.repasse);
  const totalRep=r2(parcRows.reduce((s,p)=>s+p.repasse,0));
  const TOTAL_BRUTO=fat.reduce((s,f)=>s+f.bruto,0);
  const TOTAL_LIQ=fat.reduce((s,f)=>s+f.liq,0);
  const nNov=fat.filter(f=>f.status==='novo').length;

  const fechar=()=>{
    const snapshot={mesKey,mes:MES,dataFechamento:now(),status:'fechado',fat:JSON.parse(JSON.stringify(fat)),totalBruto:TOTAL_BRUTO,totalLiq:TOTAL_LIQ,totalRep,parcRows};
    setFechamentos(fs=>[...fs.filter(f=>f.mesKey!==mesKey),snapshot]);
    setConfirmModal(false);
  };

  const reabrir=()=>{
    setFechamentos(fs=>fs.map(f=>f.mesKey===mesKey?{...f,status:'aberto',dataReabertura:now()}:f));
  };

  const restaurar=()=>{
    if(fechamentoAtual?.fat) setFat(fechamentoAtual.fat);
  };

  return (
    <div>
      <div className="ttl">Fechamento Mensal – {MES}</div>
      <div className="sub">Revisão final antes do encerramento · Fórmula: liq × % por parceiro</div>

      {/* Status atual */}
      {fechamentoAtual&&(
        <div className={`mes-card ${fechamentoAtual.status==='fechado'?'mes-fechado':'mes-aberto'} mb6`}>
          <div>
            <div className="fw7" style={{fontSize:14}}>{fechamentoAtual.status==='fechado'?'🔒 Fechado':'🔓 Reaberto'} em {fechamentoAtual.dataFechamento}</div>
            {fechamentoAtual.dataReabertura&&<div style={{color:'#f59e0b',fontSize:12,marginTop:2}}>Reaberto em {fechamentoAtual.dataReabertura}</div>}
          </div>
          <div className="flex" style={{gap:8}}>
            {fechamentoAtual.status==='fechado'
              ?<button className="btn btn-warn" onClick={reabrir}>🔓 Reabrir Mês</button>
              :<button className="btn btn-ok" onClick={()=>setConfirmModal(true)}>🔒 Fechar Novamente</button>}
            <button className="btn btn-s" onClick={restaurar}>↩ Restaurar snapshot</button>
          </div>
        </div>
      )}

      {nNov>0&&<div className="warn-box">⚠️ <strong>{nNov} projeto(s) não cadastrado(s)</strong> sem repasse. Classifique em "Sem Parceiro" antes de fechar.</div>}

      <div className="g4 mb4">
        {[{l:'Receita Bruta',v:fmt(TOTAL_BRUTO),c:'ci'},{l:'Retenções',v:fmt(fat.reduce((s,f)=>s+f.ret,0)),c:'cr'},{l:'Receita Líquida',v:fmt(TOTAL_LIQ),c:'cg'},{l:'Total Repasses',v:fmt(totalRep),c:'ca'}]
          .map((c,i)=>(<div key={i} className="card card-p tc"><div className="kpi-label">{c.l}</div><div className={`kpi-value ${c.c}`} style={{fontSize:17}}>{c.v}</div></div>))}
      </div>

      <div className="card mb4">
        <div style={{padding:'12px 16px',fontWeight:600,borderBottom:'1px solid #334155',fontSize:13}}>Tabela Final – por Parceiro</div>
        <table>
          <thead><tr><th>#</th><th>Parceiro</th><th>Projetos</th><th className="tr">Repasse</th><th className="tr">% s/ Bruto</th></tr></thead>
          <tbody>
            {parcRows.map((p,i)=>(<tr key={i}><td style={{color:'#475569'}}>{i+1}</td><td className="fw6">{p.nome}</td><td style={{color:'#64748b',fontSize:12}}>{p.projetos.join(', ')}</td><td className="tr ca fw6">{fmt(p.repasse)}</td><td className="tr" style={{color:'#64748b'}}>{((p.repasse/TOTAL_BRUTO)*100).toFixed(2)}%</td></tr>))}
            <tr style={{borderTop:'2px solid #6366f1',background:'rgba(99,102,241,.05)'}}><td colSpan={3} className="fw7">TOTAL</td><td className="tr fw7 ca">{fmt(totalRep)}</td><td className="tr" style={{color:'#64748b'}}>{((totalRep/TOTAL_BRUTO)*100).toFixed(2)}%</td></tr>
          </tbody>
        </table>
      </div>

      {!fechamentoAtual&&(
        <div className="flex" style={{gap:10}}>
          <button className="btn btn-ok" style={{fontSize:14}} onClick={()=>setConfirmModal(true)}>🔒 Encerrar Fechamento de {MES}</button>
          <button className="btn btn-s">📊 Exportar Excel</button>
          <button className="btn btn-s">📄 Exportar PDF</button>
        </div>
      )}

      {/* Histórico de fechamentos */}
      {fechamentos.length>0&&(
        <div className="mt4">
          <div className="fw6 mb3" style={{fontSize:13,color:'#94a3b8'}}>HISTÓRICO DE FECHAMENTOS</div>
          {fechamentos.map((f,i)=>(
            <div key={i} className={`mes-card ${f.status==='fechado'?'mes-fechado':'mes-aberto'}`}>
              <div>
                <div className="fw6" style={{fontSize:13}}>{f.mes}</div>
                <div style={{color:'#64748b',fontSize:12}}>Bruto: {fmt(f.totalBruto)} · Repasses: {fmt(f.totalRep)} · {f.status==='fechado'?'🔒 Fechado':'🔓 Reaberto'} em {f.dataFechamento}</div>
              </div>
              <span className={`badge ${f.status==='fechado'?'bg':'by'}`}>{f.status==='fechado'?'Fechado':'Reaberto'}</span>
            </div>
          ))}
        </div>
      )}

      {/* Confirmação */}
      <Modal open={confirmModal} onClose={()=>setConfirmModal(false)} title={`Confirmar fechamento de ${MES}`} width={480}>
        <div style={{color:'#94a3b8',fontSize:13,marginBottom:16,lineHeight:1.6}}>
          Isso irá salvar um snapshot dos dados atuais. Você poderá reabrir o mês a qualquer momento e restaurar o estado salvo.
        </div>
        <div style={{background:'rgba(16,185,129,.08)',border:'1px solid rgba(16,185,129,.2)',borderRadius:8,padding:'12px 14px',marginBottom:16,fontSize:13}}>
          Total de repasses: <strong className="cg">{fmt(totalRep)}</strong> · {parcRows.length} parceiro(s)
        </div>
        <div className="flex" style={{gap:10}}>
          <button className="btn btn-ok" onClick={fechar}>✓ Confirmar e Fechar</button>
          <button className="btn btn-s" onClick={()=>setConfirmModal(false)}>Cancelar</button>
        </div>
      </Modal>
    </div>
  );
}

/* ══ RELATÓRIOS ══ */
function Relatorios({fat}) {
  const [tab,setTab]=useState('projetos');
  const [busca,setBusca]=useState('');
  const filtered=busca?fat.filter(f=>f.projeto.toLowerCase().includes(busca.toLowerCase())||f.parceiros.some(p=>p.nome.toLowerCase().includes(busca.toLowerCase()))):fat;
  const totalRep=fat.reduce((s,f)=>s+f.totalRepasse,0);
  const TOTAL_BRUTO=fat.reduce((s,f)=>s+f.bruto,0);
  const byParc={};
  fat.forEach(f=>f.parceiros.forEach(p=>{ if(!byParc[p.nome])byParc[p.nome]={projetos:0,repasse:0}; byParc[p.nome].projetos++;byParc[p.nome].repasse+=p.repasse; }));
  const parcRows=Object.entries(byParc).map(([nome,v])=>({nome,...v})).sort((a,b)=>b.repasse-a.repasse);
  return (
    <div>
      <div className="ttl">Relatórios – Maio/2026</div>
      <div className="sub">pivot.xlsx × Cadastro de Parceiros</div>
      <div className="tab-bar">
        {[['projetos','📁 Por Projeto'],['parceiros','👥 Por Parceiro']].map(([id,l])=>(<button key={id} className={`tab${tab===id?' on':''}`} onClick={()=>setTab(id)}>{l}</button>))}
      </div>
      {tab==='projetos'&&(
        <div>
          <input placeholder="🔍 Filtrar..." value={busca} onChange={e=>setBusca(e.target.value)} style={{maxWidth:280,marginBottom:12}}/>
          <div className="card oa">
            <table>
              <thead><tr><th>#</th><th>Data</th><th>Projeto</th><th>Cliente</th><th>Parceiros</th><th className="tr">Bruta</th><th className="tr">Líquida</th><th className="tr">Repasse</th><th>St.</th></tr></thead>
              <tbody>
                {filtered.map((f,i)=>(<tr key={f.id}>
                  <td style={{color:'#475569'}}>{i+1}</td>
                  <td style={{color:'#64748b',fontSize:11,whiteSpace:'nowrap'}}>{f.data||'—'}</td>
                  <td className="fw6">{f.projeto}</td>
                  <td style={{color:'#64748b',fontSize:11,maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.cliente}</td>
                  <td style={{verticalAlign:'top'}}>{f.parceiros.length===0?<span style={{color:'#475569'}}>—</span>:f.parceiros.map((p,j)=>(<div key={j} className="parc-chip"><span style={{color:'#e2e8f0'}}>{p.nome}</span>{p.tipo==='fixo'?<span style={{color:'#06b6d4'}}>Fixo</span>:<span className="pct">{fmtP(p.pct)}</span>}{p.desRetidos&&<span style={{color:'#10b981',fontSize:10,fontWeight:700}}>+ret</span>}{p.desTrib&&<span style={{color:'#f59e0b',fontSize:10,fontWeight:700}}>−trib</span>}<span className="rep">{fmt(p.repasse)}</span></div>))}</td>
                  <td className="tr ci">{fmt(f.bruto)}</td><td className="tr cg fw6">{fmt(f.liq)}</td><td className="tr ca fw6">{f.totalRepasse>0?fmt(f.totalRepasse):'—'}</td>
                  <td>{f.status==='historico'?<span className="badge bg">✓</span>:f.status==='novo'?<span className="badge bo">⚠</span>:<span className="badge bgg">N/A</span>}</td>
                </tr>))}
                <tr style={{borderTop:'2px solid #334155',background:'rgba(99,102,241,.04)'}}><td colSpan={4} className="fw7">TOTAL</td><td className="tr fw7 ci">{fmt(TOTAL_BRUTO)}</td><td className="tr fw7 cg">{fmt(fat.reduce((s,f)=>s+f.liq,0))}</td><td className="tr fw7 ca">{fmt(totalRep)}</td><td></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      )}
      {tab==='parceiros'&&(
        <div className="card oa">
          <table>
            <thead><tr><th>#</th><th>Parceiro</th><th className="tc">Projetos</th><th className="tr">Repasse</th><th className="tr">% s/ Bruto</th></tr></thead>
            <tbody>
              {parcRows.map((p,i)=>(<tr key={i}><td style={{color:'#475569'}}>{i+1}</td><td className="fw6">{p.nome}</td><td className="tc" style={{color:'#94a3b8'}}>{p.projetos}</td><td className="tr ca fw6">{fmt(p.repasse)}</td><td className="tr" style={{color:'#64748b'}}>{((p.repasse/TOTAL_BRUTO)*100).toFixed(2)}%</td></tr>))}
              <tr style={{borderTop:'2px solid #334155',background:'rgba(99,102,241,.04)'}}><td colSpan={3} className="fw7">TOTAL</td><td className="tr fw7 ca">{fmt(totalRep)}</td><td className="tr" style={{color:'#64748b'}}>{((totalRep/TOTAL_BRUTO)*100).toFixed(2)}%</td></tr>
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ══ APP ROOT ══ */
function App() {
  const [loggedIn,setLoggedIn]       = useState(false);
  const [page,setPage]               = useState('dashboard');
  const [savedAt,setSavedAt]         = useState('');

  // Estado persistido no localStorage
  // Parceiros: mescla seed com os que o usuário já salvou (nunca perde dados do usuário)
  const [todosParceiros,setTodosParceirosRaw] = useState(()=>{
    const saved = LS.get('pt_parceiros', null);
    if (!saved) return PARCEIROS_SEED;
    // Garante que parceiros do seed existam, mas sem sobrescrever os do usuário
    const nomesSalvos = new Set(saved.map(p=>p.nome));
    const faltando = PARCEIROS_SEED.filter(p=>!nomesSalvos.has(p.nome));
    return faltando.length > 0 ? [...saved, ...faltando] : saved;
  });
  const [cadastro,setCadastroRaw]             = useState(()=>LS.get('pt_cadastro', CADASTRO_SEED));
  const [fat,setFatRaw]                       = useState(()=>LS.get('pt_fat_2026_05', buildFatFromCad(FAT_RAW_SEED, CADASTRO_SEED)));
  const [fechamentos,setFechamentosRaw]       = useState(()=>LS.get('pt_fechamentos', []));

  // Wrappers que salvam automaticamente
  const setTodosParceiros = useCallback(v => { setTodosParceirosRaw(v); }, []);
  const setCadastro       = useCallback(v => { setCadastroRaw(v); }, []);
  const setFat            = useCallback(v => { setFatRaw(v); }, []);
  const setFechamentos    = useCallback(v => { setFechamentosRaw(v); }, []);

  // Persiste tudo no localStorage sempre que mudar
  useEffect(()=>{ LS.set('pt_parceiros', todosParceiros); setSavedAt(now()); },[todosParceiros]);
  useEffect(()=>{ LS.set('pt_cadastro', cadastro); setSavedAt(now()); },[cadastro]);
  useEffect(()=>{ LS.set('pt_fat_2026_05', fat); setSavedAt(now()); },[fat]);
  useEffect(()=>{ LS.set('pt_fechamentos', fechamentos); setSavedAt(now()); },[fechamentos]);

  if(!loggedIn) return <Login onLogin={()=>setLoggedIn(true)}/>;

  const nNov=fat.filter(f=>f.status==='novo').length;
  const pages={
    dashboard:      <Dashboard fat={fat}/>,
    importar:       <Importar setPage={setPage} fat={fat} setFat={setFat} cadastro={cadastro}/>,
    conferencia:    <Conferencia fat={fat} setFat={setFat} todosParceiros={todosParceiros} setCadastro={setCadastro} setPage={setPage}/>,
    'sem-parceiro': <SemParceiro fat={fat} setFat={setFat} todosParceiros={todosParceiros} setCadastro={setCadastro}/>,
    parceiros:      <Parceiros todosParceiros={todosParceiros} setTodosParceiros={setTodosParceiros} cadastro={cadastro} setCadastro={setCadastro} fat={fat}/>,
    fechamento:     <Fechamento fat={fat} fechamentos={fechamentos} setFechamentos={setFechamentos} setFat={setFat}/>,
    relatorios:     <Relatorios fat={fat}/>,
  };

  return (
    <div style={{display:'flex'}}>
      <Sidebar page={page} setPage={setPage} setLoggedIn={setLoggedIn} nNov={nNov} savedAt={savedAt}/>
      <div className="main">{pages[page]||<Dashboard fat={fat}/>}</div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>


</body></html>
